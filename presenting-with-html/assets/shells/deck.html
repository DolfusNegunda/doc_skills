<!DOCTYPE html>
<html lang="en" data-theme="{{ default_theme }}" data-format="deck" data-style="{{ style_name }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page_title }}</title>
<!--
  Built by presenting-with-html/scripts/build_html.py — DO NOT EDIT THE SHELL BY HAND.
  Content changes: edit the content.json and rebuild. The shell owns the single
  <head>/<style>/<script>, the fixed 16:9 stage, the HUD, per-slide branded footer,
  and the class vocabulary; slides are injected between the deck markers only.
-->
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  /* ==== Design tokens: parallel light + dark sets (brand-derived) — shared with report shell ==== */
  :root, :root[data-theme="light"] {
    --brand:{{ light_accent_1 }};
    --accent:{{ light_accent_1 }}; --accent-2:{{ light_accent_2 }}; --accent-3:{{ light_accent_3 }};
    --bg:{{ light_bg_1 }}; --panel:#FFFFFF;
    --panel-2:color-mix(in srgb, {{ light_accent_1 }} 4%, #FFFFFF);
    --text:{{ ink }}; --muted:{{ muted }};
    --faint:color-mix(in srgb, {{ muted }} 62%, #FFFFFF);
    --hair:color-mix(in srgb, {{ muted }} 20%, #FFFFFF);
    --hair-strong:color-mix(in srgb, {{ muted }} 34%, #FFFFFF);
    --pos:#0E8A5F; --neg:#C4384B;
    --shadow:0 2px 6px rgba(16,32,80,.05), 0 24px 60px -28px rgba(16,32,80,.28);
    --grid:color-mix(in srgb, {{ muted }} 20%, #FFFFFF);
    --tint:color-mix(in srgb, {{ light_accent_1 }} 7%, #FFFFFF);
    --glass-bg:var(--panel); --glass-border:var(--hair); --card-bg:var(--panel-2);
  }
  :root[data-theme="dark"] {
    --brand:{{ dark_accent_1 }};
    --accent:{{ dark_accent_1 }}; --accent-2:{{ dark_accent_2 }}; --accent-3:{{ dark_accent_3 }};
    --bg:{{ dark_bg_0 }};
    --panel:color-mix(in srgb, #FFFFFF 6%, {{ dark_bg_0 }});
    --panel-2:color-mix(in srgb, #FFFFFF 3.5%, {{ dark_bg_0 }});
    --text:#EAEEF7; --muted:#9AA4BC; --faint:#6C7590;
    --hair:rgba(255,255,255,.10); --hair-strong:rgba(255,255,255,.17);
    --pos:#3FCF97; --neg:#F0708A;
    --shadow:0 2px 6px rgba(0,0,0,.4), 0 30px 70px -30px rgba(0,0,0,.7);
    --grid:rgba(255,255,255,.10);
    --tint:color-mix(in srgb, {{ dark_accent_1 }} 16%, {{ dark_bg_0 }});
    --glass-bg:var(--panel); --glass-border:var(--hair); --card-bg:var(--panel-2);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body { font-family:"{{ font_body }}",-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--text); background:var(--bg); overflow:hidden;
    -webkit-font-smoothing:antialiased; text-wrap:pretty; transition:background .4s ease, color .3s ease; }
  h1,h2,h3 { font-family:"{{ font_heading }}","{{ font_body }}",Georgia,serif; letter-spacing:-.01em; }
  .num { font-variant-numeric:tabular-nums lining-nums; }

  /* ==== Fixed 16:9 stage that scales to fit ==== */
  .viewport { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .stage { width:1920px; height:1080px; position:relative; flex:none; transform-origin:center center; }
  .slide { position:absolute; inset:0; background:var(--panel); overflow:hidden;
    opacity:0; visibility:hidden; transition:opacity .4s ease; display:flex; flex-direction:column; }
  .slide.active { opacity:1; visibility:visible; }
  .utility-bar { height:10px; background:linear-gradient(90deg,var(--brand),var(--accent-3)); flex:none; }
  .slide-pad { flex:1; padding:96px 112px 88px; display:flex; flex-direction:column; min-height:0; }

  /* ==== Typography ==== */
  .eyebrow { text-transform:uppercase; letter-spacing:.22em; font-size:26px; font-weight:700; color:var(--brand); }
  h1 { font-size:104px; line-height:1.02; font-weight:700; letter-spacing:-.02em; }
  h1 .accent { color:var(--brand); }
  h2 { font-size:60px; line-height:1.08; font-weight:600; }
  .lead { font-size:34px; line-height:1.4; color:var(--muted); max-width:52ch; margin-top:32px; }
  .note, .section-note { font-size:28px; color:var(--muted); margin-top:14px; max-width:70ch; line-height:1.4; }
  p.body { font-size:28px; line-height:1.55; color:var(--muted); margin-top:18px; max-width:66ch; }
  .accent { color:var(--brand); }
  .footnote { color:var(--faint); font-size:24px; margin-top:28px; }
  .section-kicker { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
  .section-kicker .rule { width:52px; height:4px; background:var(--brand); border-radius:3px; }
  .section-kicker span { font-size:24px; letter-spacing:.16em; text-transform:uppercase; font-weight:700; color:var(--brand); }

  /* ==== Per-slide branded footer (logo/wordmark + title + page + confidential) ==== */
  .slide-foot { flex:none; height:74px; padding:0 112px; display:flex; align-items:center; gap:20px;
    border-top:1px solid var(--hair); color:var(--faint); font-size:22px; background:var(--panel); }
  .slide-foot .logo { height:34px; display:flex; align-items:center; }
  .slide-foot .logo img { height:100%; width:auto; display:block; }
  .slide-foot .logo .wordmark { font-family:"{{ font_heading }}","{{ font_body }}",serif; font-weight:700; font-size:26px; color:var(--text); }
  .slide-foot .foot-div { width:1px; height:30px; background:var(--hair-strong); }
  .slide-foot .foot-title { color:var(--muted); font-weight:600; }
  .slide-foot .foot-meta { margin-left:auto; display:flex; align-items:center; gap:22px; }
  .slide-foot .foot-meta .conf { letter-spacing:.1em; text-transform:uppercase; font-size:19px; font-weight:600; }
  .slide-foot .pg { font-variant-numeric:tabular-nums; color:var(--muted); font-weight:700; }

  /* ==== Full-bleed slide types (no footer bar) ==== */
  .slide.title .slide-pad, .slide.closing .slide-pad { justify-content:center; background:
    radial-gradient(1100px 520px at 82% -12%, color-mix(in srgb,var(--brand) 12%,transparent), transparent 68%), var(--panel); }
  .slide.section .slide-pad, .slide.quote .slide-pad { justify-content:center; background:var(--tint); }
  .section-num { font-family:"{{ font_heading }}","{{ font_body }}",serif; font-size:180px; font-weight:700; line-height:1;
    color:var(--brand); opacity:.9; }
  .section .h2, .section h2 { font-size:88px; font-weight:600; margin-top:8px; }

  /* ==== KPI band (title) ==== */
  .kpi-band { display:grid; grid-template-columns:repeat(4,1fr); margin-top:auto; border-top:1px solid var(--hair); }
  .kpi-band.cols-2 { grid-template-columns:repeat(2,1fr); } .kpi-band.cols-3 { grid-template-columns:repeat(3,1fr); }
  .kpi-band .kpi { padding:34px 34px 6px; border-right:1px solid var(--hair); }
  .kpi-band .kpi:last-child { border-right:none; padding-right:0; }
  .kpi-band .kpi:first-child { padding-left:0; }
  .kpi .label { font-size:24px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); }
  .kpi .value { font-size:72px; font-weight:700; margin-top:8px; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .kpi .delta { font-size:26px; margin-top:8px; font-weight:600; color:var(--pos); font-variant-numeric:tabular-nums; }
  .kpi .delta.down { color:var(--neg); }

  /* ==== KPI row (content) ==== */
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:28px; margin-top:auto; margin-bottom:auto; }
  .kpi-row.cols-2 { grid-template-columns:repeat(2,1fr); } .kpi-row.cols-3 { grid-template-columns:repeat(3,1fr); }
  .kpi-row .kpi { background:var(--panel-2); border:1px solid var(--hair); border-radius:18px; padding:44px; }
  .kpi-row .kpi .value { font-size:88px; }

  /* ==== Cards ==== */
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:26px; margin-top:auto; margin-bottom:auto; }
  .grid.cols-2 { grid-template-columns:repeat(2,1fr); } .grid.cols-3 { grid-template-columns:repeat(3,1fr); }
  .card { background:var(--panel-2); border:1px solid var(--hair); border-radius:18px; padding:36px; }
  .card h3 { font-size:30px; font-weight:600; margin-bottom:14px; }
  .card p { font-size:24px; color:var(--muted); line-height:1.45; }
  .card .big { font-size:52px; font-weight:700; margin-top:24px; font-variant-numeric:tabular-nums; }
  .card .big.accent { color:var(--brand); } .card .big.neg { color:var(--neg); }

  /* ==== Chart + narrative ==== */
  .analysis { display:grid; grid-template-columns:1.7fr 1fr; gap:44px; margin-top:36px; flex:1; min-height:0; }
  .chart-panel { background:var(--panel-2); border:1px solid var(--hair); border-radius:18px;
    padding:28px; display:flex; flex-direction:column; min-height:0; }
  .chart { flex:1; min-height:0; width:100%; height:100%; }
  .chart.short { min-height:0; }
  .source { color:var(--faint); font-size:20px; margin-top:14px; }
  .aside { display:flex; flex-direction:column; gap:24px; justify-content:center; }
  .callout { background:var(--panel-2); border:1px solid var(--hair); border-left:5px solid var(--brand);
    border-radius:14px; padding:28px 30px; margin-top:0; }
  .callout-label { font-size:20px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; color:var(--brand); margin-bottom:10px; }
  .callout p { font-size:27px; line-height:1.45; color:var(--text); margin:0; }
  .callout.takeaway, .callout.recommendation, .callout.info { border-left-color:var(--brand); }
  .callout.action, .callout.warning { border-left-color:var(--neg); }
  .callout.action .callout-label, .callout.warning .callout-label { color:var(--neg); }

  /* ==== two-col ==== */
  .two-col { display:grid; grid-template-columns:1.3fr 1fr; gap:44px; margin-top:36px; flex:1; min-height:0; align-items:stretch; }
  .bullets { list-style:none; align-self:center; }
  .bullets li { position:relative; padding:16px 0 16px 40px; font-size:30px; line-height:1.4; color:var(--text); }
  .bullets li::before { content:""; position:absolute; left:0; top:.7em; width:14px; height:14px; border-radius:4px; transform:rotate(45deg); background:var(--brand); }
  .bullets li .sub { display:block; color:var(--muted); font-size:24px; margin-top:4px; }

  /* ==== Table ==== */
  .table-wrap { margin-top:36px; border:1px solid var(--hair); border-radius:16px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:26px; }
  thead th { text-align:left; padding:22px 28px; font-weight:600; color:var(--muted); background:var(--panel-2);
    text-transform:uppercase; letter-spacing:.05em; font-size:20px; border-bottom:1px solid var(--hair-strong); }
  tbody td { padding:22px 28px; color:var(--muted); border-bottom:1px solid var(--hair); font-variant-numeric:tabular-nums; }
  tbody tr:nth-child(even) td { background:var(--panel-2); }
  tbody tr:last-child td { border-bottom:none; }
  tbody td:first-child { color:var(--text); font-weight:600; }

  /* ==== Quote ==== */
  .quote-wrap { padding-left:40px; border-left:6px solid var(--brand); }
  .quote-text { font-family:"{{ font_heading }}","{{ font_body }}",serif; font-size:64px; line-height:1.28; font-weight:500; max-width:26ch; }
  .quote-attr { font-size:28px; color:var(--muted); margin-top:40px; }

  /* ==== HUD ==== */
  .toolbar { position:fixed; top:22px; right:26px; z-index:60; display:flex; gap:12px; }
  .btn { cursor:pointer; background:var(--panel); border:1px solid var(--hair-strong); color:var(--text);
    padding:10px 16px; border-radius:10px; font-size:15px; font-weight:600; font-family:inherit; box-shadow:var(--shadow); }
  .btn:hover { border-color:var(--brand); }
  .nav-btn { position:fixed; top:50%; transform:translateY(-50%); z-index:60; width:56px; height:56px; border-radius:50%;
    cursor:pointer; background:var(--panel); border:1px solid var(--hair-strong); color:var(--text); font-size:26px;
    display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); }
  .nav-btn:hover { border-color:var(--brand); color:var(--brand); }
  .nav-btn.prev { left:26px; } .nav-btn.next { right:26px; }
  .rail { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:60; display:flex; align-items:center; gap:16px;
    background:var(--panel); border:1px solid var(--hair-strong); border-radius:999px; padding:10px 20px; box-shadow:var(--shadow); }
  .progress { display:flex; gap:9px; }
  .dot { width:10px; height:10px; border-radius:50%; border:none; padding:0; cursor:pointer; background:var(--hair-strong); }
  .dot.active { background:var(--brand); transform:scale(1.3); }
  .slide-count { font-variant-numeric:tabular-nums; color:var(--muted); font-size:15px; font-weight:600; }

  /* ==== office components (dense reporting decks) ==== */
  ol.agenda, ol.steps { list-style:none; counter-reset:n; margin-top:24px; padding:0; }
  ol.agenda li, ol.steps li { counter-increment:n; position:relative; padding:20px 0 20px 84px;
    border-bottom:1px solid var(--hair); font-size:32px; }
  ol.agenda li::before, ol.steps li::before { content:counter(n, decimal-leading-zero);
    position:absolute; left:0; top:18px; font-weight:700; color:var(--brand); font-size:34px; font-variant-numeric:tabular-nums; }
  .step-title { font-weight:600; } .step-desc, ol.agenda .sub { color:var(--muted); font-size:26px; margin-top:6px; }
  .team-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:28px; margin-top:auto; margin-bottom:auto; }
  .person { background:var(--panel-2); border:1px solid var(--hair); border-radius:18px; padding:36px 28px; text-align:center; }
  .avatar { width:110px; height:110px; border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:44px; background:var(--brand); color:#fff; overflow:hidden; }
  .avatar img { width:100%; height:100%; object-fit:cover; }
  .person-name { font-weight:700; font-size:32px; } .person-role { color:var(--muted); font-size:26px; margin-top:4px; }
  .person-note { font-size:24px; margin-top:10px; color:var(--muted); }
  .rag-list { margin-top:auto; margin-bottom:auto; }
  .rag-row { display:flex; align-items:center; gap:28px; padding:26px 0; border-bottom:1px solid var(--hair); }
  .rag-row:last-child { border-bottom:none; }
  .rag { flex:none; width:150px; text-align:center; font-size:22px; font-weight:700; letter-spacing:.06em; padding:8px 0;
    border-radius:10px; color:#fff; text-transform:uppercase; }
  .rag.green { background:var(--pos); } .rag.amber { background:#B7791F; } .rag.red { background:var(--neg); }
  .rag-label { font-weight:600; font-size:32px; } .rag-note { color:var(--muted); font-size:26px; margin-top:4px; }
  .rag-metric { margin-left:auto; font-variant-numeric:tabular-nums; font-weight:700; font-size:34px; }
  dl.defs { margin-top:24px; } dl.defs dt { font-weight:700; margin-top:24px; color:var(--brand); font-size:32px; }
  dl.defs dd { margin:8px 0 0; color:var(--muted); font-size:28px; }
  .timeline { margin-top:36px; position:relative; }
  .timeline::before { content:""; position:absolute; left:14px; top:16px; bottom:16px; width:3px; background:var(--brand); opacity:.35; }
  .tl-item { position:relative; padding:0 0 40px 64px; }
  .tl-item:last-child { padding-bottom:0; }
  .tl-item::before { content:""; position:absolute; left:4px; top:.25em; width:24px; height:24px; border-radius:50%; background:var(--panel); border:5px solid var(--brand); }
  .tl-item.done::before { background:var(--brand); }
  .tl-label { font-size:22px; text-transform:uppercase; letter-spacing:.12em; color:var(--brand); font-weight:700; }
  .tl-title { font-weight:700; font-size:34px; margin-top:4px; } .tl-body { color:var(--muted); font-size:27px; line-height:1.45; margin-top:6px; }
  .compare { display:grid; grid-template-columns:1fr 1fr; gap:32px; margin-top:36px; }
  .compare-panel { background:var(--panel-2); border:1px solid var(--hair); border-radius:18px; padding:36px; }
  .compare-panel h3 { font-size:24px; text-transform:uppercase; letter-spacing:.12em; color:var(--brand); margin-bottom:18px; }
  .compare-panel.alt h3 { color:var(--accent-2); }
  .compare-panel ul { list-style:none; }
  .compare-panel li { position:relative; padding:12px 0 12px 34px; font-size:28px; line-height:1.4; }
  .compare-panel li::before { content:""; position:absolute; left:2px; top:.85em; width:12px; height:12px; border-radius:3px; transform:rotate(45deg); background:var(--brand); }
  .compare-panel.alt li::before { background:var(--accent-2); }
  .figure { margin-top:36px; border:1px solid var(--hair); border-radius:18px; overflow:hidden; background:var(--panel-2); }
  .figure img { display:block; width:100%; height:auto; }
  .figure-caption { padding:18px 28px; color:var(--muted); font-size:24px; }
  .pill { display:inline-block; padding:4px 18px; border-radius:999px; font-size:20px; font-weight:700; color:#fff; }
  .pill.high { background:var(--neg); } .pill.med { background:#B7791F; } .pill.low { background:var(--pos); }
  p a, li a, .card a, td a { color:var(--brand); text-decoration:underline; text-underline-offset:2px; }
  code { font-family:ui-monospace,Consolas,monospace; font-size:.88em;
         background:color-mix(in srgb, var(--muted) 16%, transparent); padding:1px 8px; border-radius:6px; }

  /* ==== Reduced motion ==== */
  @media (prefers-reduced-motion: reduce){ * { transition:none !important; animation:none !important; } }
  /* ==== Print / PDF — one slide per landscape page ==== */
  @media print {
    @page { size:1920px 1080px; margin:0; }
    body { overflow:visible; background:#fff; }
    .viewport { position:static; display:block; }
    .stage { transform:none !important; width:1920px; height:auto; }
    .toolbar, .nav-btn, .rail { display:none !important; }
    .slide { position:relative; inset:auto; width:1920px; height:1080px; opacity:1 !important; visibility:visible !important;
      break-after:page; page-break-after:always; }
    .slide:last-child { break-after:auto; page-break-after:auto; }
  }
{{ style_css }}</style>
</head>
<body>
<div class="viewport">
  <div class="stage" id="stage" data-conf="{{ confidential }}">
{{ slides }}
  </div>
</div>
<template id="footBrand">{{ brand_foot }}</template>

<!-- HUD -->
<div class="toolbar">
  <button class="btn" id="themeToggle" aria-label="Toggle light/dark theme">☾ Dark</button>
</div>
<button class="nav-btn prev" id="prevBtn" aria-label="Previous slide">‹</button>
<button class="nav-btn next" id="nextBtn" aria-label="Next slide">›</button>
<div class="rail">
  <div class="progress" id="progress"></div>
  <div class="slide-count" id="slideCount">…</div>
</div>

<script>
(function () {
  const root = document.documentElement;
  const stage = document.getElementById('stage');
  const slides = Array.from(stage.querySelectorAll('.slide'));
  const progress = document.getElementById('progress');
  const counter = document.getElementById('slideCount');
  const charts = [];
  let current = 0;

  /* ---- Fixed-stage scale to fit ---- */
  function fit() {
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    stage.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit); fit();

  /* ---- Per-slide branded footer (logo/wordmark · title · NN / NN · confidential) ---- */
  const brandFoot = document.getElementById('footBrand').innerHTML;
  const conf = stage.getAttribute('data-conf') || '';
  const N = String(slides.length).padStart(2, '0');
  slides.forEach((s, idx) => {
    const foot = s.querySelector('.slide-foot');
    if (!foot) return;
    const title = s.getAttribute('data-title') || '';
    foot.innerHTML =
      brandFoot +
      (brandFoot ? '<span class="foot-div"></span>' : '') +
      '<span class="foot-title">' + title + '</span>' +
      '<span class="foot-meta"><span class="pg">' + String(idx + 1).padStart(2, '0') + ' / ' + N + '</span>' +
      (conf ? '<span class="conf">' + conf + '</span>' : '') + '</span>';
  });

  /* ---- Theme ---- */
  function themeColors() {
    const cs = getComputedStyle(root);
    return {
      font: cs.getPropertyValue('--text').trim(),
      grid: cs.getPropertyValue('--grid').trim(),
      accents: [cs.getPropertyValue('--accent').trim(),
                cs.getPropertyValue('--accent-2').trim(),
                cs.getPropertyValue('--accent-3').trim()]
    };
  }
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    try { localStorage.setItem('deck-theme', theme); } catch (e) {}
    document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀ Light' : '☾ Dark';
    charts.forEach(c => c.build(themeColors()));
  }
  (function initTheme() {
    let t = '{{ default_theme }}';
    try { t = localStorage.getItem('deck-theme') || '{{ default_theme }}'; } catch (e) {}
    try {
      const forced = new URLSearchParams(location.search).get('theme');
      if (forced === 'dark' || forced === 'light') t = forced;
    } catch (e) {}
    root.setAttribute('data-theme', t);
    document.getElementById('themeToggle').textContent = t === 'dark' ? '☀ Light' : '☾ Dark';
  })();
  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  /* ---- Navigation ---- */
  slides.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Go to slide ' + (i + 1));
    d.addEventListener('click', () => showSlide(i));
    progress.appendChild(d);
  });
  function showSlide(i) {
    current = (i + slides.length) % slides.length;
    slides.forEach((s, k) => s.classList.toggle('active', k === current));
    Array.from(progress.children).forEach((d, k) => d.classList.toggle('active', k === current));
    counter.textContent = (current + 1) + ' / ' + slides.length;
    window.dispatchEvent(new Event('resize'));
  }
  document.getElementById('prevBtn').addEventListener('click', () => showSlide(current - 1));
  document.getElementById('nextBtn').addEventListener('click', () => showSlide(current + 1));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') showSlide(current + 1);
    else if (e.key === 'ArrowLeft') showSlide(current - 1);

  function baseLayout(t, extra) {

      font: { color: t.font, family: '{{ font_body }}, Segoe UI, Inter, sans-serif', size: 22 },

    }, extra || {});

  const CONFIG = { responsive: true, displayModeBar: false };
  function registerChart(sel, dataFor, extraLayout) {
    const el = document.querySelector(sel);
    if (!el || !window.Plotly) return;
    const build = t => Plotly.react(el, dataFor(t), baseLayout(t, extraLayout), CONFIG);
    charts.push({ el, build });
    build(themeColors());
