<!DOCTYPE html>
<html lang="en" data-theme="{{ default_theme }}" data-format="deck" data-style="{{ style_name }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page_title }}</title>
<!--
  Built by presenting-with-html/scripts/build_html.py — DO NOT EDIT THE SHELL BY HAND.
  Content changes: edit the content.json and rebuild. The shell owns the single
  <head>/<style>/<script>, the HUD, and the class vocabulary; slides are injected
  between the deck markers only.
-->
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  /* ---- Design tokens: parallel dark + light sets (brand-derived) ---- */
  :root, :root[data-theme="dark"] {
    --bg-0:{{ dark_bg_0 }}; --bg-1:{{ dark_bg_1 }}; --bg-glow:{{ dark_glow }};
    --text:#e8ecf5; --muted:#8b93a7;
    --accent:{{ dark_accent_1 }}; --accent-2:{{ dark_accent_2 }}; --accent-3:{{ dark_accent_3 }};
    --glass-bg:rgba(255,255,255,.055); --glass-border:rgba(255,255,255,.12);
    --card-bg:rgba(255,255,255,.05); --shadow:0 24px 60px -20px rgba(0,0,0,.65);
    --grid:rgba(255,255,255,.08);
  }
  :root[data-theme="light"] {
    --bg-0:{{ light_bg_0 }}; --bg-1:{{ light_bg_1 }}; --bg-glow:{{ light_glow }};
    --text:{{ ink }}; --muted:{{ muted }};
    --accent:{{ light_accent_1 }}; --accent-2:{{ light_accent_2 }}; --accent-3:{{ light_accent_3 }};
    --glass-bg:rgba(255,255,255,.62); --glass-border:rgba(15,23,42,.10);
    --card-bg:rgba(255,255,255,.72); --shadow:0 24px 60px -24px rgba(30,50,90,.35);
    --grid:rgba(15,23,42,.10);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    font-family:"{{ font_body }}",-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--text); overflow:hidden;
    background:
      radial-gradient(1200px 800px at 78% -8%, var(--bg-glow), transparent 60%),
      radial-gradient(900px 700px at 8% 108%, {{ glow_2 }}, transparent 55%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1));
    transition:background .5s ease, color .35s ease;
  }
  /* ---- Deck + slides ---- */
  .deck { position:fixed; inset:0; }
  .slide {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    padding:clamp(20px,4vw,64px); opacity:0; visibility:hidden;
    transform:translateY(14px) scale(.995); transition:opacity .5s ease, transform .5s ease;
  }
  .slide.active { opacity:1; visibility:visible; transform:none; }
  .slide-inner {
    width:min(1180px,100%); max-height:100%; overflow-y:auto; padding:clamp(24px,3.4vw,52px);
    background:var(--glass-bg); border:1px solid var(--glass-border);
    border-radius:24px; box-shadow:var(--shadow); backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
  }
  .slide-inner::-webkit-scrollbar { width:8px; }
  .slide-inner::-webkit-scrollbar-thumb { background:var(--glass-border); border-radius:8px; }
  /* ---- Typography ---- */
  .eyebrow { text-transform:uppercase; letter-spacing:.22em; font-size:.78rem; font-weight:700;
    color:var(--accent); margin-bottom:18px; }
  h1 { font-family:"{{ font_heading }}","{{ font_body }}",sans-serif;
    font-size:clamp(2.4rem,5.2vw,4.2rem); line-height:1.03; font-weight:800; letter-spacing:-.02em; }
  h2 { font-family:"{{ font_heading }}","{{ font_body }}",sans-serif;
    font-size:clamp(1.5rem,2.8vw,2.3rem); font-weight:750; letter-spacing:-.01em; margin-bottom:6px; }
  .lead { font-size:clamp(1rem,1.5vw,1.25rem); color:var(--muted); max-width:60ch; margin-top:16px; line-height:1.5; }
  .section-note { color:var(--muted); margin-bottom:22px; max-width:70ch; }
  p.body { color:var(--muted); max-width:74ch; line-height:1.6; margin-top:14px; }
  .accent { background:linear-gradient(90deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .footnote { color:var(--muted); font-size:.85rem; margin-top:34px; }
  /* ---- Section divider ---- */
  .section-num { font-size:clamp(4rem,9vw,7rem); font-weight:800; letter-spacing:-.03em;
    background:linear-gradient(120deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1; margin-bottom:18px; }
  /* ---- Bullets ---- */
  .bullets { list-style:none; margin-top:22px; }
  .bullets li { position:relative; padding:9px 0 9px 30px; font-size:clamp(1rem,1.5vw,1.2rem);
    line-height:1.5; color:var(--text); }
  .bullets li::before { content:""; position:absolute; left:2px; top:1.05em; width:10px; height:10px;
    border-radius:3px; transform:rotate(45deg);
    background:linear-gradient(135deg,var(--accent),var(--accent-2)); }
  .bullets li .sub { color:var(--muted); font-size:.92em; }
  /* ---- KPI cards ---- */
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-top:36px; }
  .kpi-row.cols-2 { grid-template-columns:repeat(2,1fr); }
  .kpi-row.cols-3 { grid-template-columns:repeat(3,1fr); }
  .kpi { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:16px;
    padding:22px 20px; }
  .kpi .label { font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .kpi .value { font-size:clamp(1.8rem,3vw,2.6rem); font-weight:800; margin-top:8px; letter-spacing:-.02em; }
  .kpi .delta { font-size:.85rem; margin-top:6px; color:var(--accent); }
  .kpi .delta.down { color:{{ alert_soft }}; }
  /* ---- Highlight / recommendation grid ---- */
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:8px; }
  .card { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:16px; padding:22px; }
  .card h3 { font-size:1.05rem; margin-bottom:8px; }
  .card p { color:var(--muted); font-size:.95rem; line-height:1.5; }
  .card .big { font-size:1.7rem; font-weight:800; margin-top:12px; }
  /* ---- Chart panel ---- */
  .chart-panel { background:var(--card-bg); border:1px solid var(--glass-border);
    border-radius:18px; padding:14px; margin-top:20px; }
  .chart { width:100%; height:min(56vh,460px); }
  .chart.short { height:min(40vh,340px); }
  /* ---- Tables ---- */
  .table-wrap { margin-top:20px; max-height:44vh; overflow:auto; border:1px solid var(--glass-border);
    border-radius:14px; }
  table { width:100%; border-collapse:collapse; font-size:.92rem; }
  thead th { position:sticky; top:0; background:var(--card-bg); backdrop-filter:blur(8px);
    text-align:left; padding:12px 16px; font-weight:700; border-bottom:1px solid var(--glass-border); }
  tbody td { padding:11px 16px; color:var(--muted); border-bottom:1px solid var(--grid); }
  tbody tr:last-child td { border-bottom:none; }
  tbody td:first-child { color:var(--text); font-weight:600; }
  .two-col { display:grid; grid-template-columns:1.4fr 1fr; gap:24px; align-items:start; margin-top:8px; }
  .two-col .card + .table-wrap, .two-col .card + .card { margin-top:16px; }
  /* ---- Brand mark ---- */
  .brand-mark { position:fixed; top:18px; left:22px; z-index:40; height:46px;
    background:rgba(255,255,255,.94); border:1px solid var(--glass-border); border-radius:12px;
    padding:7px 12px; display:flex; align-items:center; }
  .brand-mark img { height:100%; width:auto; display:block; }
  /* ---- HUD: nav, dots, counter, theme, hint ---- */
  .nav-btn { position:fixed; top:50%; transform:translateY(-50%); z-index:40;
    width:52px; height:52px; border-radius:50%; cursor:pointer;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text);
    backdrop-filter:blur(10px); font-size:1.4rem; display:flex; align-items:center; justify-content:center;
    transition:background .25s, transform .15s; }
  .nav-btn:hover { background:var(--card-bg); }
  .nav-btn:active { transform:translateY(-50%) scale(.92); }
  .nav-btn.prev { left:22px; } .nav-btn.next { right:22px; }
  .hud { position:fixed; z-index:40; display:flex; align-items:center; gap:14px; }
  .hud.bottom { left:50%; bottom:20px; transform:translateX(-50%); }
  .progress { display:flex; gap:9px; }
  .dot { width:9px; height:9px; border-radius:50%; cursor:pointer; border:none; padding:0;
    background:var(--glass-border); transition:transform .2s, background .2s; }
  .dot.active { background:linear-gradient(90deg,var(--accent),var(--accent-2)); transform:scale(1.35); }
  .slide-count { font-variant-numeric:tabular-nums; color:var(--muted); font-size:.85rem;
    background:var(--glass-bg); border:1px solid var(--glass-border); padding:6px 12px; border-radius:999px; }
  .hint { position:fixed; left:22px; bottom:22px; z-index:40; color:var(--muted); font-size:.78rem; opacity:.8; }
  .confidential { position:fixed; right:22px; bottom:22px; z-index:40; color:var(--muted);
    font-size:.72rem; letter-spacing:.06em; opacity:.75; max-width:44ch; text-align:right; }
  .theme-toggle { position:fixed; top:20px; right:22px; z-index:40; cursor:pointer;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text);
    padding:9px 14px; border-radius:999px; backdrop-filter:blur(10px); font-size:.85rem; font-weight:600; }
  /* ---- Quote / callout ---- */
  .quote-wrap { margin-top:20px; padding:10px 0 10px 28px; border-left:4px solid var(--accent); }
  .quote-text { font-size:clamp(1.25rem,2.4vw,1.85rem); line-height:1.45; font-weight:650; letter-spacing:-.01em; }
  .quote-attr { margin-top:14px; color:var(--muted); font-size:.95rem; }
  /* ---- Timeline / milestones ---- */
  .timeline { margin-top:26px; position:relative; }
  .timeline::before { content:""; position:absolute; left:8px; top:10px; bottom:10px; width:2px;
    background:linear-gradient(var(--accent), var(--accent-2)); opacity:.45; }
  .tl-item { position:relative; padding:0 0 20px 34px; }
  .tl-item:last-child { padding-bottom:0; }
  .tl-item::before { content:""; position:absolute; left:2px; top:.3em; width:13px; height:13px;
    border-radius:50%; background:var(--bg-1); border:3px solid var(--accent); }
  .tl-item.done::before { background:var(--accent); }
  .tl-label { font-size:.76rem; text-transform:uppercase; letter-spacing:.12em; color:var(--accent); font-weight:700; }
  .tl-title { font-weight:700; margin-top:2px; }
  .tl-body { color:var(--muted); font-size:.95rem; line-height:1.5; margin-top:3px; max-width:70ch; }
  /* ---- Comparison / before-after ---- */
  .compare { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:22px; }
  .compare-panel { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:16px; padding:20px 22px; }
  .compare-panel h3 { font-size:.85rem; text-transform:uppercase; letter-spacing:.12em; color:var(--accent); margin-bottom:10px; }
  .compare-panel.alt h3 { color:var(--accent-2); }
  .compare-panel ul { list-style:none; }
  .compare-panel li { position:relative; padding:6px 0 6px 22px; line-height:1.5; }
  .compare-panel li::before { content:""; position:absolute; left:2px; top:.95em; width:7px; height:7px;
    border-radius:2px; transform:rotate(45deg); background:var(--accent); }
  .compare-panel.alt li::before { background:var(--accent-2); }
  /* ---- Image / figure ---- */
  .figure { margin-top:20px; border:1px solid var(--glass-border); border-radius:14px; overflow:hidden; background:var(--card-bg); }
  .figure img { display:block; width:100%; height:auto; }
  .figure-caption { padding:10px 16px; color:var(--muted); font-size:.85rem; }
  /* ---- Responsive ---- */
  @media (max-width:820px){
    .kpi-row{ grid-template-columns:repeat(2,1fr); }
    .grid{ grid-template-columns:1fr; }
    .two-col{ grid-template-columns:1fr; } .compare{ grid-template-columns:1fr; }
    .slide{ padding:14px; } .slide-inner{ padding:20px; border-radius:18px; }
    .nav-btn{ width:42px; height:42px; } .nav-btn.prev{ left:8px; } .nav-btn.next{ right:8px; }
    .hint{ display:none; } .confidential{ display:none; } .brand-mark{ height:36px; }
  }
  /* ---- Reduced motion (a11y) ---- */
  @media (prefers-reduced-motion: reduce){
    * { transition:none !important; animation:none !important; }
  }
{{ style_css }}</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme">☀ Light</button>
{{ brand_mark }}
<div class="deck" id="deck">
{{ slides }}
</div>

<!-- HUD -->
<button class="nav-btn prev" id="prevBtn" aria-label="Previous slide">‹</button>
<button class="nav-btn next" id="nextBtn" aria-label="Next slide">›</button>
<div class="hud bottom">
  <div class="progress" id="progress"></div>
  <div class="slide-count" id="slideCount">…</div>
</div>
<div class="hint">Use ← / → arrow keys</div>
{{ confidential }}

<script>
(function () {
  const deck = document.getElementById('deck');
  const slides = Array.from(deck.querySelectorAll('.slide'));
  const progress = document.getElementById('progress');
  const counter = document.getElementById('slideCount');
  const root = document.documentElement;
  const charts = [];           // { el, build(theme) } registered chart renderers
  let current = 0;

  /* ---- Theme ---- */
  function themeColors() {
    const cs = getComputedStyle(root);
    return {
      font: cs.getPropertyValue('--text').trim(),
      grid: cs.getPropertyValue('--grid').trim(),
      accents: [cs.getPropertyValue('--accent').trim(),
                cs.getPropertyValue('--accent-2').trim(),
                cs.getPropertyValue('--accent-3').trim()]
    };
  }
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    try { localStorage.setItem('deck-theme', theme); } catch (e) {}
    document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀ Light' : '☾ Dark';
    charts.forEach(c => c.build(themeColors()));   // restyle every chart for the new theme
  }
  (function initTheme() {
    let t = '{{ default_theme }}';
    try { t = localStorage.getItem('deck-theme') || '{{ default_theme }}'; } catch (e) {}
    root.setAttribute('data-theme', t);
    document.getElementById('themeToggle').textContent = t === 'dark' ? '☀ Light' : '☾ Dark';
  })();
  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  /* ---- Navigation ---- */
  function buildDots() {
    progress.innerHTML = '';
    slides.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', 'Go to slide ' + (i + 1));
      d.addEventListener('click', () => showSlide(i));
      progress.appendChild(d);
    });
  }
  function showSlide(i) {
    current = (i + slides.length) % slides.length;   // wrap both ends
    slides.forEach((s, k) => s.classList.toggle('active', k === current));
    Array.from(progress.children).forEach((d, k) => d.classList.toggle('active', k === current));
    counter.textContent = (current + 1) + ' / ' + slides.length;
    const inner = slides[current].querySelector('.slide-inner');
    if (inner) inner.scrollTop = 0;                  // reset scroll on change
    window.dispatchEvent(new Event('resize'));       // let Plotly re-fit the new slide
  }
  document.getElementById('prevBtn').addEventListener('click', () => showSlide(current - 1));
  document.getElementById('nextBtn').addEventListener('click', () => showSlide(current + 1));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') showSlide(current + 1);
    else if (e.key === 'ArrowLeft') showSlide(current - 1);
  });

  /* ---- Charts (Plotly, theme-aware) ---- */
  function baseLayout(t, extra) {
    return Object.assign({
      paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
      font: { color: t.font, family: '{{ font_body }}, Segoe UI, Inter, sans-serif' },
      margin: { l: 54, r: 18, t: 12, b: 40 }, hovermode: 'x unified',
      legend: { orientation: 'h', y: -0.18 },
      xaxis: { gridcolor: t.grid, zeroline: false },
      yaxis: { gridcolor: t.grid, zeroline: false }
    }, extra || {});
  }
  const CONFIG = { responsive: true, displayModeBar: false };
  function registerChart(sel, dataFor, extraLayout) {
    const el = document.querySelector(sel);
    if (!el || !window.Plotly) return;
    const build = t => Plotly.react(el, dataFor(t), baseLayout(t, extraLayout), CONFIG);
    charts.push({ el, build });
    build(themeColors());
  }
{{ charts_js }}

  /* ---- Init ---- */
  buildDots();
  showSlide(0);
})();
</script>
</body>
</html>
