<!DOCTYPE html>
<html lang="en" data-theme="{{ default_theme }}" data-format="report" data-style="{{ style_name }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page_title }}</title>
<!--
  Built by presenting-with-html/scripts/build_html.py — DO NOT EDIT THE SHELL BY HAND.
  Content changes: edit the content.json and rebuild. The shell owns the single
  <head>/<style>/<script>, the TOC/scroll-spy, and the class vocabulary; sections are
  injected into <main> only.
-->
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  /* ==== Design tokens: parallel dark + light sets (brand-derived) ==== */
  :root, :root[data-theme="dark"] {
    --bg-0:{{ dark_bg_0 }}; --bg-1:{{ dark_bg_1 }}; --bg-glow:{{ dark_glow }};
    --text:#e8ecf5; --muted:#8b93a7;
    --accent:{{ dark_accent_1 }}; --accent-2:{{ dark_accent_2 }}; --accent-3:{{ dark_accent_3 }};
    --glass-bg:rgba(255,255,255,.055); --glass-border:rgba(255,255,255,.12);
    --card-bg:rgba(255,255,255,.05); --shadow:0 24px 60px -20px rgba(0,0,0,.65);
    --grid:rgba(255,255,255,.08);
  }
  :root[data-theme="light"] {
    --bg-0:{{ light_bg_0 }}; --bg-1:{{ light_bg_1 }}; --bg-glow:{{ light_glow }};
    --text:{{ ink }}; --muted:{{ muted }};
    --accent:{{ light_accent_1 }}; --accent-2:{{ light_accent_2 }}; --accent-3:{{ light_accent_3 }};
    --glass-bg:rgba(255,255,255,.62); --glass-border:rgba(15,23,42,.10);
    --card-bg:rgba(255,255,255,.72); --shadow:0 24px 60px -24px rgba(30,50,90,.35);
    --grid:rgba(15,23,42,.10);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body {
    font-family:"{{ font_body }}",-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--text); min-height:100%;
    background:
      radial-gradient(1200px 800px at 78% -8%, var(--bg-glow), transparent 60%),
      radial-gradient(900px 700px at 8% 108%, {{ glow_2 }}, transparent 55%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1));
    background-attachment:fixed;
    transition:background .5s ease, color .35s ease;
  }
  /* ==== Typography ==== */
  .eyebrow { text-transform:uppercase; letter-spacing:.22em; font-size:.78rem; font-weight:700;
    color:var(--accent); margin-bottom:18px; }
  h1 { font-family:"{{ font_heading }}","{{ font_body }}",sans-serif;
    font-size:clamp(2.2rem,4.6vw,3.6rem); line-height:1.05; font-weight:800; letter-spacing:-.02em; }
  h2 { font-family:"{{ font_heading }}","{{ font_body }}",sans-serif;
    font-size:clamp(1.5rem,2.8vw,2.1rem); font-weight:750; letter-spacing:-.01em; margin-bottom:8px; }
  h3 { font-size:1.05rem; }
  .lead { font-size:clamp(1rem,1.5vw,1.2rem); color:var(--muted); max-width:70ch; margin-top:16px; line-height:1.55; }
  .section-note { color:var(--muted); margin-bottom:22px; max-width:74ch; line-height:1.55; }
  p.body { color:var(--muted); max-width:74ch; line-height:1.65; margin-top:14px; }
  .accent { background:linear-gradient(90deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .footnote { color:var(--muted); font-size:.85rem; margin-top:24px; }
  /* ==== Bullets ==== */
  .bullets { list-style:none; margin-top:18px; }
  .bullets li { position:relative; padding:8px 0 8px 28px; line-height:1.55; color:var(--text); }
  .bullets li::before { content:""; position:absolute; left:2px; top:1.0em; width:9px; height:9px;
    border-radius:3px; transform:rotate(45deg);
    background:linear-gradient(135deg,var(--accent),var(--accent-2)); }
  .bullets li .sub { color:var(--muted); font-size:.92em; }
  /* ==== KPI cards, cards, chart panel, tables ==== */
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-top:28px; }
  .kpi-row.cols-2 { grid-template-columns:repeat(2,1fr); }
  .kpi-row.cols-3 { grid-template-columns:repeat(3,1fr); }
  .kpi { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:16px; padding:22px 20px; }
  .kpi .label { font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .kpi .value { font-size:clamp(1.6rem,2.6vw,2.3rem); font-weight:800; margin-top:8px; letter-spacing:-.02em; }
  .kpi .delta { font-size:.85rem; margin-top:6px; color:var(--accent); }
  .kpi .delta.down { color:{{ alert_soft }}; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:16px; }
  .card { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:16px; padding:22px; }
  .card h3 { margin-bottom:8px; }
  .card p { color:var(--muted); font-size:.95rem; line-height:1.5; }
  .card .big { font-size:1.7rem; font-weight:800; margin-top:12px; }
  .chart-panel { background:var(--card-bg); border:1px solid var(--glass-border);
    border-radius:18px; padding:14px; margin-top:20px; }
  .chart { width:100%; height:min(52vh,440px); }
  .chart.short { height:min(38vh,320px); }
  .table-wrap { margin-top:20px; overflow:auto; border:1px solid var(--glass-border); border-radius:14px; }
  table { width:100%; border-collapse:collapse; font-size:.92rem; }
  thead th { position:sticky; top:0; background:var(--card-bg); backdrop-filter:blur(8px);
    text-align:left; padding:12px 16px; font-weight:700; border-bottom:1px solid var(--glass-border); }
  tbody td { padding:11px 16px; color:var(--muted); border-bottom:1px solid var(--grid); }
  tbody tr:last-child td { border-bottom:none; }
  tbody td:first-child { color:var(--text); font-weight:600; }
  .two-col { display:grid; grid-template-columns:1.4fr 1fr; gap:24px; align-items:start; }
  .two-col .card + .table-wrap, .two-col .card + .card { margin-top:16px; }

  /* ==== REPORT LAYOUT — document flow with a sticky sidebar TOC ==== */
  .report { display:grid; grid-template-columns:250px minmax(0,1fr); gap:40px;
    max-width:1240px; margin:0 auto; padding:48px clamp(20px,4vw,56px) 96px; }
  .toc { position:sticky; top:24px; align-self:start; max-height:calc(100vh - 48px); overflow:auto;
    background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:18px;
    padding:20px; backdrop-filter:blur(18px) saturate(140%); -webkit-backdrop-filter:blur(18px) saturate(140%);
    box-shadow:var(--shadow); }
  .toc .toc-title { text-transform:uppercase; letter-spacing:.14em; font-size:.72rem; font-weight:700;
    color:var(--muted); margin-bottom:14px; }
  .toc a { display:block; color:var(--muted); text-decoration:none; font-size:.9rem; line-height:1.35;
    padding:7px 10px; border-radius:9px; border-left:2px solid transparent; transition:color .2s, background .2s, border-color .2s; }
  .toc a:hover { color:var(--text); background:var(--card-bg); }
  .toc a.active { color:var(--text); background:var(--card-bg); border-left-color:var(--accent); font-weight:600; }
  .content { min-width:0; }
  .report-section {
    background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:24px;
    box-shadow:var(--shadow); backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    padding:clamp(24px,3.4vw,44px); margin-bottom:28px; scroll-margin-top:24px;
  }
  .report-section.hero { background:transparent; border:none; box-shadow:none; backdrop-filter:none;
    -webkit-backdrop-filter:none; padding:8px 4px 20px; }
  .hero-logo { height:52px; margin-bottom:26px; background:rgba(255,255,255,.94);
    border:1px solid var(--glass-border); border-radius:12px; padding:8px 12px;
    display:inline-flex; align-items:center; }
  .hero-logo img { height:100%; width:auto; display:block; }
  .report-footer { color:var(--muted); font-size:.8rem; letter-spacing:.04em; line-height:1.7;
    text-align:center; padding:12px 0 0; }

  /* ==== HUD: theme toggle + back-to-top ==== */
  .theme-toggle { position:fixed; top:20px; right:22px; z-index:40; cursor:pointer;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text);
    padding:9px 14px; border-radius:999px; backdrop-filter:blur(10px); font-size:.85rem; font-weight:600; }
  .to-top { position:fixed; right:22px; bottom:22px; z-index:40; cursor:pointer;
    width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text);
    backdrop-filter:blur(10px); font-size:1.2rem; opacity:0; pointer-events:none; transition:opacity .3s; }
  .to-top.show { opacity:1; pointer-events:auto; }

  /* ---- Quote / callout ---- */
  .quote-wrap { margin-top:20px; padding:10px 0 10px 28px; border-left:4px solid var(--accent); }
  .quote-text { font-size:clamp(1.25rem,2.4vw,1.85rem); line-height:1.45; font-weight:650; letter-spacing:-.01em; }
  .quote-attr { margin-top:14px; color:var(--muted); font-size:.95rem; }
  /* ---- Timeline / milestones ---- */
  .timeline { margin-top:26px; position:relative; }
  .timeline::before { content:""; position:absolute; left:8px; top:10px; bottom:10px; width:2px;
    background:linear-gradient(var(--accent), var(--accent-2)); opacity:.45; }
  .tl-item { position:relative; padding:0 0 20px 34px; }
  .tl-item:last-child { padding-bottom:0; }
  .tl-item::before { content:""; position:absolute; left:2px; top:.3em; width:13px; height:13px;
    border-radius:50%; background:var(--bg-1); border:3px solid var(--accent); }
  .tl-item.done::before { background:var(--accent); }
  .tl-label { font-size:.76rem; text-transform:uppercase; letter-spacing:.12em; color:var(--accent); font-weight:700; }
  .tl-title { font-weight:700; margin-top:2px; }
  .tl-body { color:var(--muted); font-size:.95rem; line-height:1.5; margin-top:3px; max-width:70ch; }
  /* ---- Comparison / before-after ---- */
  .compare { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:22px; }
  .compare-panel { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:16px; padding:20px 22px; }
  .compare-panel h3 { font-size:.85rem; text-transform:uppercase; letter-spacing:.12em; color:var(--accent); margin-bottom:10px; }
  .compare-panel.alt h3 { color:var(--accent-2); }
  .compare-panel ul { list-style:none; }
  .compare-panel li { position:relative; padding:6px 0 6px 22px; line-height:1.5; }
  .compare-panel li::before { content:""; position:absolute; left:2px; top:.95em; width:7px; height:7px;
    border-radius:2px; transform:rotate(45deg); background:var(--accent); }
  .compare-panel.alt li::before { background:var(--accent-2); }
  /* ---- Image / figure ---- */
  .figure { margin-top:20px; border:1px solid var(--glass-border); border-radius:14px; overflow:hidden; background:var(--card-bg); }
  .figure img { display:block; width:100%; height:auto; }
  .figure-caption { padding:10px 16px; color:var(--muted); font-size:.85rem; }
  /* ==== Responsive ==== */
  @media (max-width:900px){
    .report { grid-template-columns:1fr; gap:20px; padding:24px 16px 72px; }
    .toc { position:static; max-height:none; }
    .kpi-row{ grid-template-columns:repeat(2,1fr); }
    .grid{ grid-template-columns:1fr; }
    .two-col{ grid-template-columns:1fr; } .compare{ grid-template-columns:1fr; }
  }

  /* ==== Reduced motion (a11y) ==== */
  @media (prefers-reduced-motion: reduce){
    html { scroll-behavior:auto; }
    * { transition:none !important; animation:none !important; }
  }

  /* ==== Print / PDF (long-form is often printed) ==== */
  @media print {
    :root, :root[data-theme="dark"], :root[data-theme="light"] {
      --text:#0f172a; --muted:#3d4761;
      --glass-bg:#fff; --glass-border:#c7d0e0; --card-bg:#fff; --grid:#d5dceb; --shadow:none;
    }
    body { background:#fff !important; }
    .theme-toggle, .to-top, .toc { display:none !important; }
    .report { display:block; max-width:none; padding:0; }
    .report-section { break-inside:avoid; page-break-inside:avoid; box-shadow:none;
      border:1px solid var(--glass-border); backdrop-filter:none; margin-bottom:16px; }
    .chart { height:360px; }
    a { color:inherit; text-decoration:none; }
  }
  /* inline rich text (builder mini-markup: **bold**, *italic*, `code`, [link](url)) */
  p a, li a, .card a, td a { color:var(--accent); text-decoration:underline; text-underline-offset:2px; }
  code { font-family:ui-monospace,Consolas,monospace; font-size:.88em;
         background:rgba(127,127,127,.16); padding:1px 6px; border-radius:5px; }
{{ style_css }}</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme">☀ Light</button>

<div class="report">
  <!-- Sidebar table of contents (auto-populated from sections) -->
  <nav class="toc" id="toc" aria-label="Table of contents">
    <div class="toc-title">Contents</div>
  </nav>

  <main class="content" id="content">
{{ sections }}
    <footer class="report-footer">{{ report_footer }}</footer>
  </main>
</div>

<button class="to-top" id="toTop" aria-label="Back to top">↑</button>

<script>
(function () {
  const root = document.documentElement;
  const charts = [];           // { el, build(theme) } registered chart renderers

  /* ==== Theme ==== */
  function themeColors() {
    const cs = getComputedStyle(root);
    return {
      font: cs.getPropertyValue('--text').trim(),
      grid: cs.getPropertyValue('--grid').trim(),
      accents: [cs.getPropertyValue('--accent').trim(),
                cs.getPropertyValue('--accent-2').trim(),
                cs.getPropertyValue('--accent-3').trim()]
    };
  }
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    try { localStorage.setItem('report-theme', theme); } catch (e) {}
    document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀ Light' : '☾ Dark';
    charts.forEach(c => c.build(themeColors()));   // restyle every chart for the new theme
  }
  (function initTheme() {
    let t = '{{ default_theme }}';
    try { t = localStorage.getItem('report-theme') || '{{ default_theme }}'; } catch (e) {}
    /* QA hook: ?theme=dark|light forces a theme (not persisted) for screenshots */
    try {
      const forced = new URLSearchParams(location.search).get('theme');
      if (forced === 'dark' || forced === 'light') t = forced;
    } catch (e) {}
    root.setAttribute('data-theme', t);
    document.getElementById('themeToggle').textContent = t === 'dark' ? '☀ Light' : '☾ Dark';
  })();
  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  /* ==== REPORT NAV — build TOC from sections, scroll-spy the active one ==== */
  const sections = Array.from(document.querySelectorAll('.report-section[id]'));
  const toc = document.getElementById('toc');
  const tocLinks = new Map();
  sections.forEach(sec => {
    const label = sec.getAttribute('data-toc') || sec.id;
    const a = document.createElement('a');
    a.href = '#' + sec.id;
    a.textContent = label;
    toc.appendChild(a);
    tocLinks.set(sec.id, a);
  });
  const spy = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        tocLinks.forEach(l => l.classList.remove('active'));
        const link = tocLinks.get(e.target.id);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });
  sections.forEach(s => spy.observe(s));

  /* ==== Back-to-top ==== */
  const toTop = document.getElementById('toTop');
  toTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  window.addEventListener('scroll', () => toTop.classList.toggle('show', window.scrollY > 600), { passive: true });

  /* ==== Charts (Plotly, theme-aware) ==== */
  function baseLayout(t, extra) {
    return Object.assign({
      paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
      font: { color: t.font, family: '{{ font_body }}, Segoe UI, Inter, sans-serif' },
      margin: { l: 54, r: 18, t: 12, b: 40 }, hovermode: 'x unified',
      legend: { orientation: 'h', y: -0.18 },
      xaxis: { gridcolor: t.grid, zeroline: false },
      yaxis: { gridcolor: t.grid, zeroline: false }
    }, extra || {});
  }
  const CONFIG = { responsive: true, displayModeBar: false };
  function registerChart(sel, dataFor, extraLayout) {
    const el = document.querySelector(sel);
    if (!el || !window.Plotly) return;
    const build = t => Plotly.react(el, dataFor(t), baseLayout(t, extraLayout), CONFIG);
    charts.push({ el, build });
    build(themeColors());
  }
{{ charts_js }}
})();
</script>
</body>
</html>
