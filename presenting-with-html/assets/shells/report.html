<!DOCTYPE html>
<html lang="en" data-theme="{{ default_theme }}" data-format="report" data-style="{{ style_name }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page_title }}</title>
<!--
  Built by presenting-with-html/scripts/build_html.py — DO NOT EDIT THE SHELL BY HAND.
  Content changes: edit the content.json and rebuild. The shell owns the single
  <head>/<style>/<script>, the masthead/TOC/scroll-spy, and the class vocabulary;
  sections are injected into <main> only. Branding (logo -> wordmark fallback),
  the cover KPI band, and the footer band are assembled by the builder.
-->
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  /* ==== Design tokens: parallel dark + light sets (brand-derived) ==== */
  :root, :root[data-theme="light"] {
    --brand:{{ light_accent_1 }};
    --accent:{{ light_accent_1 }}; --accent-2:{{ light_accent_2 }}; --accent-3:{{ light_accent_3 }};
    --bg:{{ light_bg_0 }}; --panel:#FFFFFF;
    --panel-2:color-mix(in srgb, {{ light_accent_1 }} 4%, #FFFFFF);
    --text:{{ ink }}; --muted:{{ muted }};
    --faint:color-mix(in srgb, {{ muted }} 62%, #FFFFFF);
    --hair:color-mix(in srgb, {{ muted }} 20%, #FFFFFF);
    --hair-strong:color-mix(in srgb, {{ muted }} 34%, #FFFFFF);
    --pos:#0E8A5F; --neg:#C4384B;
    --shadow:0 1px 2px rgba(16,32,80,.04), 0 6px 20px -12px rgba(16,32,80,.14);
    --grid:color-mix(in srgb, {{ muted }} 20%, #FFFFFF);
    /* back-compat aliases so preset overrides + legacy classes still resolve */
    --glass-bg:var(--panel); --glass-border:var(--hair); --card-bg:var(--panel-2);
    --bg-0:{{ light_bg_0 }}; --bg-1:{{ light_bg_1 }};
  }
  :root[data-theme="dark"] {
    --brand:{{ dark_accent_1 }};
    --accent:{{ dark_accent_1 }}; --accent-2:{{ dark_accent_2 }}; --accent-3:{{ dark_accent_3 }};
    --bg:{{ dark_bg_0 }};
    --panel:color-mix(in srgb, #FFFFFF 6%, {{ dark_bg_0 }});
    --panel-2:color-mix(in srgb, #FFFFFF 3.5%, {{ dark_bg_0 }});
    --text:#e8ecf5; --muted:#9aa4bc; --faint:#6c7590;
    --hair:rgba(255,255,255,.10); --hair-strong:rgba(255,255,255,.17);
    --pos:#3FCF97; --neg:#F0708A;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 18px 44px -20px rgba(0,0,0,.6);
    --grid:rgba(255,255,255,.10);
    --glass-bg:var(--panel); --glass-border:var(--hair); --card-bg:var(--panel-2);
    --bg-0:{{ dark_bg_0 }}; --bg-1:{{ dark_bg_1 }};
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body {
    font-family:"{{ font_body }}",-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--text); background:var(--bg); min-height:100%;
    -webkit-font-smoothing:antialiased; text-wrap:pretty;
    transition:background .35s ease, color .3s ease;
  }
  .num, .kpi .value, .kpi .delta, tbody td, thead th { font-variant-numeric:tabular-nums lining-nums; }
  /* ==== Typography ==== */
  .eyebrow { text-transform:uppercase; letter-spacing:.18em; font-size:.76rem; font-weight:700;
    color:var(--brand); }
  h1 { font-family:"{{ font_heading }}","{{ font_body }}",sans-serif;
    font-size:clamp(2.1rem,4.4vw,3.4rem); line-height:1.05; font-weight:700; letter-spacing:-.02em; }
  h2 { font-family:"{{ font_heading }}","{{ font_body }}",sans-serif;
    font-size:clamp(1.35rem,2vw,1.85rem); font-weight:650; letter-spacing:-.01em; }
  h3 { font-size:1.02rem; font-weight:600; }
  .lead { font-size:clamp(1rem,1.4vw,1.18rem); color:var(--muted); max-width:72ch; margin-top:16px; line-height:1.55; }
  .section-note { color:var(--muted); margin-top:6px; margin-bottom:20px; max-width:78ch; line-height:1.55; }
  p.body { color:var(--muted); max-width:78ch; line-height:1.65; margin-top:14px; }
  .accent { color:var(--brand); }
  .footnote { color:var(--muted); font-size:.85rem; margin-top:20px; }
  /* auto accent kicker above each section heading */
  .section-kicker { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .section-kicker .rule { width:26px; height:2px; background:var(--brand); border-radius:2px; }
  /* ==== Bullets ==== */
  .bullets { list-style:none; margin-top:18px; }
  .bullets li { position:relative; padding:8px 0 8px 28px; line-height:1.55; color:var(--text); }
  .bullets li::before { content:""; position:absolute; left:2px; top:1.0em; width:9px; height:9px;
    border-radius:3px; transform:rotate(45deg); background:var(--brand); }
  .bullets li .sub { color:var(--muted); font-size:.92em; }
  /* ==== KPI cards ==== */
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:20px; }
  .kpi-row.cols-2 { grid-template-columns:repeat(2,1fr); }
  .kpi-row.cols-3 { grid-template-columns:repeat(3,1fr); }
  .kpi-row .kpi { background:var(--panel-2); border:1px solid var(--hair); border-radius:11px; padding:18px; }
  .kpi .label { font-size:.74rem; color:var(--faint); text-transform:uppercase; letter-spacing:.08em; }
  .kpi .value { font-size:clamp(1.7rem,2.6vw,2.4rem); font-weight:700; margin-top:6px; letter-spacing:-.02em; }
  .kpi .delta { font-size:.82rem; margin-top:5px; font-weight:600; color:var(--pos); }
  .kpi .delta.down { color:var(--neg); }
  /* cover KPI band (edge-to-edge under the hero) */
  .kpi-band { display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid var(--hair); }
  .kpi-band.cols-2 { grid-template-columns:repeat(2,1fr); }
  .kpi-band.cols-3 { grid-template-columns:repeat(3,1fr); }
  .kpi-band .kpi { padding:22px clamp(20px,2.4vw,32px); border-right:1px solid var(--hair); }
  .kpi-band .kpi:last-child { border-right:none; }
  /* ==== Cards ==== */
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:18px; }
  .card { background:var(--panel-2); border:1px solid var(--hair); border-radius:11px; padding:20px; }
  .card h3 { margin-bottom:7px; }
  .card p { color:var(--muted); font-size:.92rem; line-height:1.5; }
  .card .big { font-size:1.7rem; font-weight:700; margin-top:12px; }
  .card .big.accent { color:var(--brand); }
  /* ==== Chart panel ==== */
  .chart-panel { background:var(--panel-2); border:1px solid var(--hair);
    border-radius:12px; padding:16px; margin-top:18px; }
  .chart { width:100%; height:min(52vh,440px); }
  .chart.short { height:min(38vh,320px); }
  /* ==== Tables ==== */
  .table-wrap { margin-top:18px; overflow:auto; border:1px solid var(--hair); border-radius:11px; }
  table { width:100%; border-collapse:collapse; font-size:.9rem; }
  thead th { position:sticky; top:0; background:var(--panel-2);
    text-align:left; padding:11px 16px; font-weight:600; color:var(--muted);
    text-transform:uppercase; letter-spacing:.06em; font-size:.72rem;
    border-bottom:1px solid var(--hair-strong); }
  tbody td { padding:11px 16px; color:var(--muted); border-bottom:1px solid var(--hair); }
  tbody tr:nth-child(even) td { background:var(--panel-2); }
  tbody tr:last-child td { border-bottom:none; }
  tbody td:first-child { color:var(--text); font-weight:600; }
  .two-col { display:grid; grid-template-columns:1.6fr 1fr; gap:24px; align-items:start; }
  .two-col .card + .table-wrap, .two-col .card + .card { margin-top:16px; }

  /* ==== IMPROVEMENT 1: full-width branded masthead ==== */
  .utility-bar { height:6px; background:linear-gradient(90deg,var(--brand),var(--accent-3)); }
  .masthead { position:sticky; top:0; z-index:50; background:var(--panel);
    border-bottom:1px solid var(--hair); box-shadow:var(--shadow);
    display:flex; align-items:center; gap:20px; padding:14px clamp(20px,4vw,56px); }
  .brand-lockup { display:flex; align-items:center; gap:14px; min-width:0; }
  /* IMPROVEMENT 2: logo — no forced white box; neutral height-sized slot that
     respects transparent logos in either theme. Falls back to a wordmark. */
  .brand-lockup .logo { height:34px; display:flex; align-items:center; }
  .brand-lockup .logo img { height:100%; width:auto; display:block; }
  .brand-lockup .wordmark { font-family:"{{ font_heading }}","{{ font_body }}",sans-serif;
    font-size:1.15rem; font-weight:700; letter-spacing:-.01em; color:var(--text); }
  .brand-divider { width:1px; height:30px; background:var(--hair-strong); }
  .masthead-title { font-size:.95rem; font-weight:600; line-height:1.2;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .masthead-title small { display:block; font-weight:500; font-size:.72rem;
    letter-spacing:.14em; text-transform:uppercase; color:var(--faint); }
  .masthead-spacer { flex:1; }
  .masthead-meta { display:flex; align-items:center; gap:18px; color:var(--muted);
    font-size:.82rem; white-space:nowrap; }
  .theme-toggle { cursor:pointer; background:var(--panel-2); border:1px solid var(--hair-strong);
    color:var(--text); padding:7px 13px; border-radius:8px; font-size:.8rem; font-weight:600;
    font-family:inherit; }
  .theme-toggle:hover { border-color:var(--brand); }

  /* ==== IMPROVEMENT 3: wider layout, slimmer TOC ==== */
  .report { display:grid; grid-template-columns:236px minmax(0,1fr);
    gap:clamp(28px,3.4vw,56px); max-width:1520px; margin:0 auto;
    padding:36px clamp(20px,4vw,56px) 40px; }
  .toc { position:sticky; top:88px; align-self:start; max-height:calc(100vh - 108px); overflow:auto; }
  .toc .toc-title { text-transform:uppercase; letter-spacing:.14em; font-size:.68rem; font-weight:700;
    color:var(--faint); margin-bottom:12px; padding-left:12px; }
  .toc a { display:flex; align-items:baseline; gap:9px; color:var(--muted); text-decoration:none;
    font-size:.875rem; line-height:1.3; padding:7px 12px; border-radius:8px;
    border-left:2px solid transparent; transition:color .18s, background .18s, border-color .18s; }
  .toc a .tn { font-size:.72rem; color:var(--faint); font-variant-numeric:tabular-nums; }
  .toc a:hover { color:var(--text); background:var(--panel); }
  .toc a.active { color:var(--brand); background:var(--panel); border-left-color:var(--brand);
    font-weight:600; box-shadow:var(--shadow); }
  .toc a.active .tn { color:var(--brand); }
  .content { min-width:0; display:flex; flex-direction:column; gap:22px; }
  .report-section { background:var(--panel); border:1px solid var(--hair); border-radius:14px;
    box-shadow:var(--shadow); padding:clamp(22px,2.4vw,34px); scroll-margin-top:96px; }

  /* ==== Cover / hero ==== */
  .report-section.cover { padding:0; overflow:hidden; }
  .cover-top { padding:clamp(30px,4vw,52px) clamp(26px,3vw,44px) clamp(26px,3vw,38px);
    background:radial-gradient(900px 380px at 88% -30%,
      color-mix(in srgb, var(--brand) 12%, transparent), transparent 70%), var(--panel); }
  .cover h1 { margin-top:14px; }
  .cover .lead { margin-top:16px; }

  /* ==== IMPROVEMENT 2b: branded footer band ==== */
  .report-footer { max-width:1520px; margin:0 auto; padding:22px clamp(20px,4vw,56px) 40px;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    color:var(--muted); font-size:.8rem; border-top:1px solid var(--hair); }
  .report-footer .logo { height:22px; opacity:.75; display:flex; align-items:center; }
  .report-footer .logo img { height:100%; width:auto; display:block; }
  .report-footer .wordmark { font-weight:700; color:var(--muted); }
  .report-footer .conf { margin-left:auto; letter-spacing:.08em; text-transform:uppercase;
    font-size:.72rem; font-weight:600; color:var(--faint); }

  /* ==== HUD: back-to-top ==== */
  .to-top { position:fixed; right:22px; bottom:22px; z-index:40; cursor:pointer;
    width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:var(--panel); border:1px solid var(--hair-strong); color:var(--text);
    box-shadow:var(--shadow); font-size:1.2rem; opacity:0; pointer-events:none; transition:opacity .3s; }
  .to-top.show { opacity:1; pointer-events:auto; }

  /* ---- Quote / callout ---- */
  .quote-wrap { margin-top:20px; padding:10px 0 10px 28px; border-left:4px solid var(--brand); }
  .quote-text { font-size:clamp(1.25rem,2.4vw,1.85rem); line-height:1.45; font-weight:600; letter-spacing:-.01em; }
  .quote-attr { margin-top:14px; color:var(--muted); font-size:.95rem; }
  /* ---- Timeline / milestones ---- */
  .timeline { margin-top:24px; position:relative; }
  .timeline::before { content:""; position:absolute; left:8px; top:10px; bottom:10px; width:2px;
    background:var(--brand); opacity:.35; }
  .tl-item { position:relative; padding:0 0 20px 34px; }
  .tl-item:last-child { padding-bottom:0; }
  .tl-item::before { content:""; position:absolute; left:2px; top:.3em; width:13px; height:13px;
    border-radius:50%; background:var(--panel); border:3px solid var(--brand); }
  .tl-item.done::before { background:var(--brand); }
  .tl-label { font-size:.76rem; text-transform:uppercase; letter-spacing:.12em; color:var(--brand); font-weight:700; }
  .tl-title { font-weight:700; margin-top:2px; }
  .tl-body { color:var(--muted); font-size:.95rem; line-height:1.5; margin-top:3px; max-width:72ch; }
  /* ---- Comparison / before-after ---- */
  .compare { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:22px; }
  .compare-panel { background:var(--panel-2); border:1px solid var(--hair); border-radius:12px; padding:20px 22px; }
  .compare-panel h3 { font-size:.85rem; text-transform:uppercase; letter-spacing:.12em; color:var(--brand); margin-bottom:10px; }
  .compare-panel.alt h3 { color:var(--accent-2); }
  .compare-panel ul { list-style:none; }
  .compare-panel li { position:relative; padding:6px 0 6px 22px; line-height:1.5; }
  .compare-panel li::before { content:""; position:absolute; left:2px; top:.95em; width:7px; height:7px;
    border-radius:2px; transform:rotate(45deg); background:var(--brand); }
  .compare-panel.alt li::before { background:var(--accent-2); }
  /* ---- Image / figure ---- */
  .figure { margin-top:18px; border:1px solid var(--hair); border-radius:12px; overflow:hidden; background:var(--panel-2); }
  .figure img { display:block; width:100%; height:auto; }
  .figure-caption { padding:10px 16px; color:var(--muted); font-size:.85rem; }
  /* ==== Responsive ==== */
  @media (max-width:900px){
    .report { grid-template-columns:1fr; gap:20px; padding:24px 16px 32px; }
    .toc { position:static; max-height:none; }
    .kpi-row, .kpi-band { grid-template-columns:repeat(2,1fr); }
    .kpi-band .kpi:nth-child(2){ border-right:none; }
    .kpi-band .kpi:nth-child(-n+2){ border-bottom:1px solid var(--hair); }
    .grid{ grid-template-columns:1fr; }
    .two-col{ grid-template-columns:1fr; } .compare{ grid-template-columns:1fr; }
    .masthead-title small { display:none; }
  }
  /* ==== Reduced motion (a11y) ==== */
  @media (prefers-reduced-motion: reduce){
    html { scroll-behavior:auto; }
    * { transition:none !important; animation:none !important; }
  }
  /* ==== Print / PDF ==== */
  @media print {
    :root, :root[data-theme="dark"], :root[data-theme="light"] {
      --text:#0f172a; --muted:#3d4761; --faint:#6b7488;
      --panel:#fff; --panel-2:#fff; --hair:#c7d0e0; --hair-strong:#aab4c9; --grid:#d5dceb; --shadow:none;
    }
    body { background:#fff !important; }
    .theme-toggle, .to-top, .toc, .utility-bar { display:none !important; }
    .masthead { position:static; box-shadow:none; }
    .report { display:block; max-width:none; padding:0; }
    .content { gap:0; }
    .report-section { break-inside:avoid; page-break-inside:avoid; box-shadow:none;
      border:1px solid var(--hair); margin-bottom:16px; }
    .chart { height:360px; }
    a { color:inherit; text-decoration:none; }
  }
  /* inline rich text (builder mini-markup: **bold**, *italic*, `code`, [link](url)) */
  p a, li a, .card a, td a { color:var(--brand); text-decoration:underline; text-underline-offset:2px; }
  code { font-family:ui-monospace,Consolas,monospace; font-size:.88em;
         background:color-mix(in srgb, var(--muted) 16%, transparent); padding:1px 6px; border-radius:5px; }
  /* ---- office components: agenda, callout, team, status/RAG, steps, definitions ---- */
  ol.agenda, ol.steps { list-style:none; counter-reset:n; margin-top:18px; padding:0; }
  ol.agenda li, ol.steps li { counter-increment:n; position:relative;
    padding:11px 0 11px 58px; border-bottom:1px solid var(--hair); font-size:1.05rem; }
  ol.agenda li::before, ol.steps li::before { content:counter(n, decimal-leading-zero);
    position:absolute; left:0; top:9px; font-weight:700; color:var(--brand); font-size:1.05rem;
    font-variant-numeric:tabular-nums; }
  .step-title { font-weight:600; }
  .step-desc, ol.agenda .sub { color:var(--muted); font-size:.92rem; margin-top:3px; }
  .callout { margin-top:18px; padding:16px 20px; background:var(--panel-2);
    border:1px solid var(--hair); border-left:3px solid var(--brand); border-radius:10px; }
  .callout-label { font-size:.7rem; letter-spacing:.12em; text-transform:uppercase;
    font-weight:700; color:var(--brand); margin-bottom:6px; }
  .callout p { margin:0; font-size:1.02rem; color:var(--text); }
  .callout.takeaway, .callout.recommendation, .callout.info { border-left-color:var(--brand); }
  .callout.action, .callout.warning { border-left-color:var(--neg); }
  .callout.action .callout-label, .callout.warning .callout-label { color:var(--neg); }
  .team-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:16px; margin-top:18px; }
  .person { background:var(--panel-2); border:1px solid var(--hair); border-radius:14px; padding:20px 16px; text-align:center; }
  .avatar { width:64px; height:64px; border-radius:50%; margin:0 auto 10px; display:flex;
    align-items:center; justify-content:center; font-weight:700; font-size:1.25rem;
    background:var(--brand); color:#fff; overflow:hidden; }
  .avatar img { width:100%; height:100%; object-fit:cover; }
  .person-name { font-weight:700; }
  .person-role { color:var(--muted); font-size:.9rem; margin-top:2px; }
  .person-note { font-size:.85rem; margin-top:6px; color:var(--muted); overflow-wrap:anywhere; }
  .rag-list { margin-top:18px; }
  .rag-row { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--hair); }
  .rag-row:last-child { border-bottom:none; }
  .rag { flex:none; width:78px; text-align:center; font-size:.68rem; font-weight:700; letter-spacing:.06em;
    padding:4px 0; border-radius:6px; color:#fff; text-transform:uppercase; }
  .rag.green { background:var(--pos); } .rag.amber { background:#B7791F; } .rag.red { background:var(--neg); }
  .rag-label { font-weight:600; }
  .rag-note { color:var(--muted); font-size:.9rem; margin-top:2px; }
  dl.defs { margin-top:18px; }
  dl.defs dt { font-weight:700; margin-top:14px; color:var(--brand); }
  dl.defs dd { margin:4px 0 0; color:var(--muted); }
  .contact-lead { margin-top:14px; }
{{ style_css }}</style>
</head>
<body>
<div class="utility-bar"></div>
{{ masthead }}

<div class="report">
  <nav class="toc" id="toc" aria-label="Table of contents">
    <div class="toc-title">Contents</div>
  </nav>

  <main class="content" id="content">
{{ sections }}
  </main>
</div>

<footer class="report-footer">{{ report_footer }}</footer>
<button class="to-top" id="toTop" aria-label="Back to top">↑</button>

<script>
(function () {
  const root = document.documentElement;
  const charts = [];           // { el, build(theme) } registered chart renderers

  /* ==== Theme ==== */
  function themeColors() {
    const cs = getComputedStyle(root);
    return {
      font: cs.getPropertyValue('--text').trim(),
      grid: cs.getPropertyValue('--grid').trim(),
      accents: [cs.getPropertyValue('--accent').trim(),
                cs.getPropertyValue('--accent-2').trim(),
                cs.getPropertyValue('--accent-3').trim()]
    };
  }
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    try { localStorage.setItem('report-theme', theme); } catch (e) {}
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = theme === 'dark' ? '☀ Light' : '☾ Dark';
    charts.forEach(c => c.build(themeColors()));
  }
  (function initTheme() {
    let t = '{{ default_theme }}';
    try { t = localStorage.getItem('report-theme') || '{{ default_theme }}'; } catch (e) {}
    try {
      const forced = new URLSearchParams(location.search).get('theme');
      if (forced === 'dark' || forced === 'light') t = forced;
    } catch (e) {}
    root.setAttribute('data-theme', t);
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = t === 'dark' ? '☀ Light' : '☾ Dark';
  })();
  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  /* ==== TOC — build from sections, numbered, scroll-spy the active one ==== */
  const sections = Array.from(document.querySelectorAll('.report-section[id]'));
  const toc = document.getElementById('toc');
  const tocLinks = new Map();
  sections.forEach((sec, i) => {
    const label = sec.getAttribute('data-toc') || sec.id;
    const a = document.createElement('a');
    a.href = '#' + sec.id;
    a.innerHTML = '<span class="tn">' + String(i + 1).padStart(2, '0') + '</span><span>'
      + label.replace(/</g, '&lt;') + '</span>';
    toc.appendChild(a);
    tocLinks.set(sec.id, a);
  });
  const spy = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        tocLinks.forEach(l => l.classList.remove('active'));
        const link = tocLinks.get(e.target.id);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-25% 0px -65% 0px', threshold: 0 });
  sections.forEach(s => spy.observe(s));

  /* ==== Back-to-top ==== */
  const toTop = document.getElementById('toTop');
  toTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  window.addEventListener('scroll', () => toTop.classList.toggle('show', window.scrollY > 600), { passive: true });

  /* ==== Charts (Plotly, theme-aware) ==== */
  function baseLayout(t, extra) {
    return Object.assign({
      paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
      font: { color: t.font, family: '{{ font_body }}, Segoe UI, Inter, sans-serif' },
      margin: { l: 54, r: 18, t: 12, b: 40 }, hovermode: 'x unified',
      legend: { orientation: 'h', y: -0.18 },
      xaxis: { gridcolor: t.grid, zeroline: false },
      yaxis: { gridcolor: t.grid, zeroline: false }
    }, extra || {});
  }
  const CONFIG = { responsive: true, displayModeBar: false };
  function registerChart(sel, dataFor, extraLayout) {
    const el = document.querySelector(sel);
    if (!el || !window.Plotly) return;
    const build = t => Plotly.react(el, dataFor(t), baseLayout(t, extraLayout), CONFIG);
    charts.push({ el, build });
    build(themeColors());
  }
{{ charts_js }}
})();
</script>
